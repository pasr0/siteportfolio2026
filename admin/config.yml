# Pour la production (Netlify) : décommenter git-gateway et commenter test-repo
# backend:
#   name: git-gateway
#   branch: main

# Mode test local (sans git)
backend:
  name: test-repo

media_folder: "img"
public_folder: "/img"

collections:
  - name: "sommaire"
    label: "Sommaire"
    files:
      - name: "projects-list"
        label: "Liste des projets"
        file: "data/projects.json"
        format: "json"
        fields:
          - name: "items"
            label: "Projets"
            widget: "list"
            fields:
              - { name: "name", label: "Nom", widget: "string" }
              - { name: "slug", label: "Slug (URL)", widget: "string" }
              - { name: "type", label: "Type", widget: "string" }
              - name: "category"
                label: "Catégorie"
                widget: "select"
                options:
                  - "Projet de groupe"
                  - "Projet de cours"
                  - "Projet personnel"
                  - "Projet de fin d'études"
                  - "Workshop de groupe"
                  - "Workshop & Personnel"
              - { name: "year", label: "Année", widget: "number", value_type: "int", min: 2020, max: 2030 }

  - name: "projets"
    label: "Pages projets"
    folder: "data/projects"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - { name: "name", label: "Nom", widget: "string" }
      - { name: "slug", label: "Slug (URL)", widget: "string" }
      - { name: "type", label: "Type", widget: "string" }
      - name: "category"
        label: "Catégorie"
        widget: "select"
        options:
          - "Projet de groupe"
          - "Projet de cours"
          - "Projet personnel"
          - "Projet de fin d'études"
          - "Workshop de groupe"
          - "Workshop & Personnel"
      - { name: "year", label: "Année", widget: "number", value_type: "int", min: 2020, max: 2030 }
      - { name: "description", label: "Description", widget: "text", required: false }
      - name: "images"
        label: "Images"
        widget: "list"
        required: false
        field: { name: "image", label: "Image", widget: "image" }
